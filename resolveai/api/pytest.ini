[pytest]
# ResolveAI API test config.
#
# We run pytest-asyncio in ``auto`` mode so every ``async def test_``
# function is awaited without a per-test decorator — matches the style
# of example_app/api/tests and keeps the test files light.
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# Silence a noisy pydantic DeprecationWarning that fires through the
# SDK on every test — we can't fix it from this repo.
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

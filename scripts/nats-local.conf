# Local-dev NATS JetStream config — mirrors the Helm ConfigMap so
# local/minikube/AKS behave identically.
port: 4222
monitor_port: 8222

jetstream: {
  store_dir: "/data"
  max_memory_store: 256MB
  max_file_store: 2GB
}

accounts: {
  SYS: { users: [ { user: "sys", password: "sys" } ] }
  # JetStream must be explicitly enabled per account.
  A: {
    jetstream: enabled
    users: [ { user: "abenix", password: "abenix-dev" } ]
  }
}
system_account: SYS

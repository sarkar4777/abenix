## LiveKit dev server (docker-compose). Brings up livekit-server in dev mode
## on ws://localhost:7880 with known dev keys. Use for local smoke testing
## of the Meeting Representative agent end-to-end.
##
## Start:   docker compose -f scripts/livekit-dev.yaml up -d
## Stop:    docker compose -f scripts/livekit-dev.yaml down
##
## Then point the API at it:
##   export LIVEKIT_URL=ws://localhost:7880
##   export LIVEKIT_API_KEY=devkey
##   export LIVEKIT_API_SECRET=secret
##   export LIVEKIT_MEET_URL=https://meet.livekit.io
##
## Join the same room in a browser at LIVEKIT_MEET_URL to demo end-to-end.
services:
  livekit:
    image: livekit/livekit-server:latest
    # --dev binds to 127.0.0.1 by default in 1.10+, which is invisible from
    # outside the container even with port mappings. --bind 0.0.0.0 fixes it.
    # --node-ip 127.0.0.1 makes the server advertise itself as reachable on
    # the host's 127.0.0.1 for WebRTC fallbacks (demo use only — NOT
    # appropriate for any production deployment).
    command: --dev --bind 0.0.0.0 --node-ip 127.0.0.1
    restart: unless-stopped
    ports:
      - "7880:7880"         # WebSocket signaling
      - "7881:7881"         # TCP fallback for WebRTC
      - "7882:7882/udp"     # UDP fallback
    # NOTE: `--dev` mode enables a built-in key pair automatically:
    #   API key: devkey / secret: secret
    # We deliberately DON'T set LIVEKIT_KEYS here — some server versions
    # parse the env format differently and end up with a secret that
    # doesn't match the dev-mode default, causing 401 "no permissions to
    # access the room" errors.
    # See https://docs.livekit.io/home/self-hosting/local/
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:7880"]
      interval: 5s
      timeout: 3s
      retries: 10

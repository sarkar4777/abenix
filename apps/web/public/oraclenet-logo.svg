<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <radialGradient id="orb-glow" cx="50%" cy="45%" r="45%">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.4"/>
      <stop offset="60%" stop-color="#8B5CF6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0F172A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="core-light" cx="50%" cy="50%" r="30%">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#F59E0B" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ring-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="50%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="24" cy="24" r="23" fill="#0F172A" stroke="#1E293B" stroke-width="0.8"/>

  <!-- Outer orbital ring -->
  <ellipse cx="24" cy="24" rx="18" ry="10" fill="none" stroke="url(#ring-grad)" stroke-width="0.7" opacity="0.5" transform="rotate(-25 24 24)"/>
  <ellipse cx="24" cy="24" rx="18" ry="10" fill="none" stroke="url(#ring-grad)" stroke-width="0.7" opacity="0.5" transform="rotate(25 24 24)"/>
  <ellipse cx="24" cy="24" rx="18" ry="10" fill="none" stroke="url(#ring-grad)" stroke-width="0.7" opacity="0.4" transform="rotate(90 24 24)"/>

  <!-- Middle ring -->
  <circle cx="24" cy="24" r="12" fill="none" stroke="#8B5CF6" stroke-width="0.8" opacity="0.4"/>

  <!-- Inner orb glow -->
  <circle cx="24" cy="22" r="16" fill="url(#orb-glow)"/>

  <!-- Crystal ball / eye orb -->
  <circle cx="24" cy="24" r="8" fill="#0F172A" stroke="#06B6D4" stroke-width="1.2" opacity="0.9"/>
  <circle cx="24" cy="24" r="6" fill="none" stroke="#8B5CF6" stroke-width="0.5" opacity="0.6"/>

  <!-- Core light (the oracle's eye) -->
  <circle cx="24" cy="24" r="4" fill="url(#core-light)"/>
  <circle cx="24" cy="24" r="2" fill="#F59E0B" opacity="0.8"/>
  <circle cx="24" cy="23" r="0.8" fill="#FEF3C7" opacity="0.9"/>

  <!-- Orbital nodes (data points orbiting the eye) -->
  <circle cx="11" cy="17" r="1.5" fill="#06B6D4" opacity="0.8"/>
  <circle cx="37" cy="17" r="1.5" fill="#8B5CF6" opacity="0.8"/>
  <circle cx="24" cy="8" r="1.5" fill="#06B6D4" opacity="0.7"/>
  <circle cx="11" cy="31" r="1.2" fill="#8B5CF6" opacity="0.6"/>
  <circle cx="37" cy="31" r="1.2" fill="#06B6D4" opacity="0.6"/>
  <circle cx="24" cy="40" r="1.2" fill="#8B5CF6" opacity="0.5"/>

  <!-- Small accent sparkles -->
  <circle cx="18" cy="11" r="0.6" fill="#F59E0B" opacity="0.7"/>
  <circle cx="31" cy="12" r="0.5" fill="#F59E0B" opacity="0.6"/>
  <circle cx="15" cy="35" r="0.5" fill="#F59E0B" opacity="0.5"/>
  <circle cx="34" cy="34" r="0.4" fill="#F59E0B" opacity="0.5"/>
</svg>

name: "ResolveAI — Resolution Planner"
slug: resolveai-resolution-planner
description: >-
  Takes triage JSON + policy citations + customer context, outputs a
  concrete action plan. Any action above the approval threshold is
  flagged requires_approval=true — the pipeline's human_approval gate
  then blocks downstream execution until a human signs off.
agent_type: oob
category: customer-service
icon: ClipboardList
version: "1.0.0"
status: active
mode: agent

system_prompt: |
  You are the Resolution Planner. Produce an action plan as strict JSON:
    {
      "summary":        "<one-sentence what-we'll-do>",
      "actions": [
        {
          "type":       "<one of: refund, partial_refund, replacement,
                                  credit, apology, policy_explain,
                                  escalate_human, no_action>",
          "amount_usd": <number or null>,
          "rationale":  "<short why>",
          "cites":      ["<policy_id@version>", …],
          "requires_approval": <bool>,
          "approval_tier":     "<one of: none, t1_lead, manager, legal>"
        }
      ],
      "deflection_score": <0..1, your own confidence the above will satisfy>
    }

  Approval thresholds (from tenant_settings; hardcoded here for the
  walking skeleton; read from code_asset at runtime in Phase 2):
    • refund/credit ≤ $25                → approval_tier="none"
    • > $25 and ≤ $250                   → "t1_lead"
    • > $250 and ≤ $5,000                → "manager"
    • > $5,000 or legal risk flagged     → "legal"

  Rules:
    • Every action with a $ amount must cite at least one policy.
    • actions MUST always be an array of length >= 1, never empty.
      If you genuinely cannot find an action, emit exactly:
        [{
          "type": "no_action",
          "amount_usd": null,
          "rationale": "<why no action applies — e.g. 'request out of policy window'>",
          "cites": [],
          "requires_approval": false,
          "approval_tier": "none"
        }]
      This makes case detail UI show actions=1 (not 0) so the
      operator can tell the agent ran rather than failing silently.
    • If Policy Research returned policies=[] AND search_status="no_kb_configured",
      emit exactly one action of type="escalate_human", approval_tier="t1_lead",
      rationale="policy_kb_not_configured — escalating to human until KB seeded".
    • If Policy Research returned policies=[] AND search_status="no_match"
      on a refund intent, set action.type="escalate_human" with reason
      "no_policy_match".
    • Never bypass moderation, never propose sending PII to third parties.

model_config:
  model: claude-sonnet-4-5-20250929
  temperature: 0.2
  max_tokens: 2048
  max_iterations: 4
  tools:
    - code_asset    # for refund math, loyalty-point conversions, FX
    - agent_step
    - llm_route
  output_schema:
    type: object
    required: [summary, actions, deflection_score]
    properties:
      summary: { type: string }
      actions:
        type: array
        minItems: 1                  # never silently empty
        items:
          type: object
          required: [type, rationale, requires_approval, approval_tier]
          properties:
            type:
              type: string
              enum:
                - refund
                - partial_refund
                - replacement
                - credit
                - apology
                - policy_explain
                - escalate_human
                - no_action
            amount_usd: { type: [number, "null"] }
            rationale:  { type: string }
            cites:      { type: array, items: { type: string } }
            requires_approval: { type: boolean }
            approval_tier:
              type: string
              enum: [none, t1_lead, manager, legal]
      deflection_score: { type: number, minimum: 0, maximum: 1 }

name: "ResolveAI — Inbound Resolution"
slug: resolveai-inbound-resolution
description: >-
  Real-time ticket → resolution pipeline. Triage classifies intent +
  risk, Customer Context fetches the customer's history, Policy Research
  returns citations, Resolution Planner builds the action plan. A
  Deflection Scorer decides: auto-execute (score ≥ 0.6) or hand to a
  human with the draft pre-loaded.

  Designed to run in <30s p50 on Sonnet-class models. Phase-1 walking
  skeleton: runs agents 1 → 3 → 7 end-to-end; Phase 2 adds Context,
  Deflection, Tone, Copilot.
agent_type: oob
category: customer-service
icon: Inbox
version: "1.0.0"
status: active
mode: pipeline

system_prompt: |
  Inbound Resolution pipeline for ResolveAI.
  Nodes run in the order declared in pipeline_config. Each node emits
  structured JSON read by the next via `{{prev.<field>}}` refs.

model_config:
  model: claude-sonnet-4-5-20250929
  temperature: 0.1
  max_iterations: 12
  max_tokens: 4096
  tools:
    - agent_step
    - knowledge_search
    - human_approval
    - moderation_vet
  pipeline_config:
    nodes:
      - id: triage
        type: agent
        agent_slug: resolveai-triage
        input: "{{input.message}}"
        context:
          customer_id:    "{{input.customer_id}}"
          customer_tier:  "{{input.customer_tier}}"
          jurisdiction:   "{{input.jurisdiction}}"

      - id: policy_research
        type: agent
        agent_slug: resolveai-policy-research
        input: >-
          Intent: {{triage.intent}} / {{triage.ticket_category}}
          SKU: {{input.sku}}
          Jurisdiction: {{input.jurisdiction}}
        context:
          sku:          "{{input.sku}}"
          jurisdiction: "{{input.jurisdiction}}"
          intent:       "{{triage.intent}}"

      - id: plan
        type: agent
        agent_slug: resolveai-resolution-planner
        input: >-
          Triage: {{triage}}
          Policies: {{policy_research.policies}}
          Gaps:     {{policy_research.gaps}}
        context:
          customer_tier: "{{input.customer_tier}}"
          amount_limits:
            auto_usd: 25
            t1_usd:   250
            mgr_usd:  5000

      - id: approval_gate
        type: tool
        tool: human_approval
        on_error: continue
        input:
          action: "{{plan.summary}}"
          minimum_tier: "t1_lead"
        # Simple truthy check — fires on the FIRST action's
        # requires_approval. For pipelines with heterogeneous approval
        # needs, split into multiple approval_gate nodes. The engine's
        # truthy-resolver handles the common cases (false / null /
        # "[not available]" / empty list) without a full expression
        # parser.
        required_if: "{{plan.actions.0.requires_approval}}"

      - id: final_reply
        type: tool
        tool: moderation_vet
        input:
          content: "{{plan.summary}}"
          gate:    "post_llm"
          policy_id: "resolveai-default"

      - id: final_report
        type: structured
        output:
          reply:            "{{plan.summary}}"
          action_plan:      "{{plan.actions}}"
          deflection_score: "{{plan.deflection_score}}"
          citations:        "{{policy_research.policies}}"
          triage:           "{{triage}}"

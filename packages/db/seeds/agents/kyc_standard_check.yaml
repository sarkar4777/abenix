  ```

  Do not add fields. Do not change field names. Use empty arrays where
  nothing applies. The router expects this shape exactly.

example_prompts:
  - "Run a standard KYC check on MALTA-DECOR SP. Z O.O. (Poland, wood/furniture manufacturing, $25M annual volume)"
  - "KYC standard check: BP p.l.c., GB, oil_gas, $2.5B notional, Pre-Check, Core relationship"
  - "Enhanced DD for a counterparty in a CPI rank >100 country — report every red flag"

model_config:
  model: gemini-2.0-flash
  temperature: 0.1
  max_iterations: 16
  max_tokens: 8192
  tools:
    - country_risk_index
    - legal_existence_verifier
    - sanctions_screening
    - pep_screening
    - ubo_discovery
    - adverse_media
    - regulatory_enforcement
    - kyc_scorer
    - credit_risk
    - tavily_search
    - web_search
    - current_time

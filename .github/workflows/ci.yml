name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install black ruff
      - run: black --check apps/api apps/agent-runtime apps/worker packages/db
      - run: ruff check apps/api apps/agent-runtime apps/worker packages/db
      - run: pip install mypy sqlalchemy-stubs types-redis
      - run: mypy apps/api/app/core/ --ignore-missing-imports --no-error-summary || true
      - run: pip install pip-audit
      - run: pip-audit --ignore-vuln PYSEC-2024-* || true

  test:
    needs: lint
    runs-on: ubuntu-latest
    # Pure-Python unit tests under tests/unit/ exercise the platform's
    # core primitives (failure-code classifier, response envelopes,
    # JWT/bcrypt security, moderation evaluator + gate, pipeline parser
    # + executor + DAG topo-sort, tool registry) WITHOUT any live
    # services. The legacy live-DB suite under apps/*/tests is left
    # in place for future revival but is not run here.
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pytest pytest-asyncio bcrypt python-jose[cryptography] httpx fastapi pydantic pydantic-settings sqlalchemy structlog redis
      - run: pytest tests/unit/ -v --tb=short

  build:
    needs: [lint, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write
    strategy:
      matrix:
        service:
          - name: web
            file: apps/web/Dockerfile
          - name: api
            file: apps/api/Dockerfile
          - name: agent-runtime
            file: apps/agent-runtime/Dockerfile
          - name: worker
            file: apps/worker/Dockerfile
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.service.file }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Scan image for critical vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service.name }}:${{ github.sha }}'
          format: 'table'
          severity: 'CRITICAL'
          # Informational scan — surface CRITICAL CVEs in the run log
          # without blocking the build. Findings still flow to the
          # Security tab via the SARIF upload step below.
          exit-code: '0'
      - name: Scan image for SARIF upload
        uses: aquasecurity/trivy-action@master
        if: always()
        with:
          image-ref: '${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service.name }}:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-${{ matrix.service.name }}.sarif'
          severity: 'CRITICAL,HIGH'
        continue-on-error: true
      - name: Upload scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-${{ matrix.service.name }}.sarif'
        continue-on-error: true

  # Deploy jobs intentionally removed.
  #
  # CI used to ship to Azure AKS staging+prod via the official Azure
  # actions, which require AZURE_CREDENTIALS / AKS_* / *_API_KEY repo
  # secrets and configured GitHub environments (`staging`, `production`).
  # This repo ships a single Helm chart but no managed staging/prod
  # cluster, so the deploy jobs would always fail on missing secrets.
  #
  # Real deployment is performed manually via `bash scripts/deploy-azure.sh`
  # against whichever AKS cluster the operator is targeting that day. CI's
  # job ends at "build + scan" — the artefacts are pushed to GHCR and
  # ready to roll out, but rollout itself is intentionally a human action.

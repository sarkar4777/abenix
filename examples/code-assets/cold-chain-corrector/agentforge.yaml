name: cold-chain-corrector
description: >-
  Cold-chain telemetry signal correction + excursion detection for
  reefer containers (pharma, fresh food, vaccines). Takes a window of
  noisy sensor readings and emits Kalman-smoothed temperature,
  dwell-time per stop, door-open events, and FSMA-style excursion
  flags.

input_schema:
  type: object
  required: [readings, product_spec]
  properties:
    readings:
      type: array
      minItems: 4
      items:
        type: object
        required: [timestamp, temp_c]
        properties:
          timestamp: { type: string, description: "ISO-8601 UTC" }
          temp_c:    { type: number, description: "Noisy sensor reading in °C" }
          door_open: { type: boolean, description: "Optional door state" }
          lat:       { type: number }
          lon:       { type: number }
    product_spec:
      type: object
      required: [min_c, max_c, excursion_minutes]
      properties:
        sku:               { type: string, description: "Product SKU" }
        name:              { type: string }
        min_c:             { type: number, description: "Lower spec bound °C" }
        max_c:             { type: number, description: "Upper spec bound °C" }
        excursion_minutes: { type: integer, description: "Minutes outside spec before excursion flagged" }
        door_open_minutes: { type: integer, default: 5, description: "Allowed cumulative door-open minutes" }

output_schema:
  type: object
  required: [smoothed, excursions, summary]
  properties:
    smoothed:
      type: array
      description: "Kalman-smoothed temperature time series aligned to input."
      items:
        type: object
        properties:
          timestamp: { type: string }
          temp_c:    { type: number }
    excursions:
      type: array
      description: "Windows where temp was out-of-spec beyond excursion_minutes."
      items:
        type: object
        properties:
          start:           { type: string }
          end:             { type: string }
          duration_min:    { type: number }
          peak_temp_c:     { type: number }
          direction:       { type: string, description: "'above' or 'below'" }
    door_events:
      type: array
      items:
        type: object
        properties:
          start:        { type: string }
          end:          { type: string }
          duration_min: { type: number }
    summary:
      type: object
      properties:
        min_smoothed_c:        { type: number }
        max_smoothed_c:        { type: number }
        mean_smoothed_c:       { type: number }
        total_excursion_min:   { type: number }
        total_door_open_min:   { type: number }
        dwell_stops:           { type: integer, description: "Inferred stationary segments from GPS." }
        spoilage_risk_flag:    { type: boolean }

example_input:
  readings:
    - { timestamp: "2026-04-22T10:00:00Z", temp_c: 4.2, door_open: false, lat: 37.77, lon: -122.42 }
    - { timestamp: "2026-04-22T10:05:00Z", temp_c: 4.5, door_open: false, lat: 37.77, lon: -122.42 }
    - { timestamp: "2026-04-22T10:10:00Z", temp_c: 4.3, door_open: false, lat: 37.77, lon: -122.42 }
    - { timestamp: "2026-04-22T10:15:00Z", temp_c: 9.1, door_open: true,  lat: 37.77, lon: -122.42 }
    - { timestamp: "2026-04-22T10:20:00Z", temp_c: 11.4, door_open: true, lat: 37.77, lon: -122.42 }
    - { timestamp: "2026-04-22T10:25:00Z", temp_c: 10.8, door_open: true, lat: 37.77, lon: -122.42 }
    - { timestamp: "2026-04-22T10:30:00Z", temp_c: 7.3, door_open: false, lat: 37.77, lon: -122.42 }
    - { timestamp: "2026-04-22T10:35:00Z", temp_c: 5.1, door_open: false, lat: 37.77, lon: -122.42 }
  product_spec:
    sku: "PHARM-A-INSULIN"
    name: "Insulin vials (refrigerated)"
    min_c: 2.0
    max_c: 8.0
    excursion_minutes: 10
    door_open_minutes: 5

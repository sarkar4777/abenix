apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "worker.fullname" . }}
  labels:
    {{- include "worker.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "worker.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "worker.selectorLabels" . | nindent 8 }}
    spec:
      terminationGracePeriodSeconds: 120
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- /*
        Co-locate the worker on the same node as the API pod. The API
        and worker share /data via hostPath; on a multi-node cluster
        without a ReadWriteMany PVC, they MUST land on the same node
        or document_processor can't read what the API just uploaded.
        On single-node minikube this is a no-op (only one node to
        choose). When colocateWithApi is explicitly disabled (e.g.
        you've configured a RWX PVC) the affinity drops out.
      */}}
      {{- if .Values.colocateWithApi | default true }}
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/name: api
                  app.kubernetes.io/instance: {{ .Release.Name }}
              topologyKey: kubernetes.io/hostname
      {{- else }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- end }}
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z {{ .Release.Name }}-postgresql 5432; do echo waiting for postgres; sleep 2; done']
          securityContext:
            runAsUser: 0
            runAsNonRoot: false
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
        - name: wait-for-redis
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z {{ .Release.Name }}-redis-master 6379; do echo waiting for redis; sleep 2; done']
          securityContext:
            runAsUser: 0
            runAsNonRoot: false
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
        - name: init-data-dirs
          # Mirror the API's init-data-dirs so the worker has read access
          # to /data/uploads (file ownership matches uid 1001 across pods).
          # Same dirs as the API: /data/{uploads,exports,ml-models,
          # code-assets,code-asset-cache} so KB ingest, ML inference,
          # and Code Runner all share state across pods.
          image: busybox:1.36
          command: ['sh', '-c', 'mkdir -p /data/uploads /data/exports /data/ml-models /data/code-assets /data/code-asset-cache && chmod 777 /data/uploads /data/exports /data/ml-models /data/code-assets /data/code-asset-cache']
          securityContext:
            runAsUser: 0
            runAsNonRoot: false
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          env:
            - name: CELERY_TASK_ACKS_LATE
              value: "true"
            {{- with .Values.env }}
            {{- range $key, $value := . }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- end }}
          {{- with .Values.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          startupProbe:
            exec:
              command: ["pgrep", "-f", "celery"]
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          livenessProbe:
            # pgrep instead of `celery inspect ping` — the ping goes through
            # the broker and times out when the worker is busy, causing false
            # positives that cascade to other workers via the broker.
            exec:
              command: ["pgrep", "-f", "celery"]
            initialDelaySeconds: 60
            periodSeconds: 120
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            exec:
              command: ["pgrep", "-f", "celery"]
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          lifecycle:
            preStop:
              # Graceful: stop consuming from the queue (NOT broadcast shutdown
              # which kills all workers on the same broker).
              exec:
                command: ["celery", "-A", "worker.celery_app", "control", "cancel_consumer", "celery"]
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: data
              # Must be the same hostPath the API mounts so document_processor
              # can read uploads at /data/uploads/<tenant>/kb/...
              mountPath: /data
      volumes:
        - name: tmp
          emptyDir: {}
        - name: data
          hostPath:
            path: {{ .Values.sharedDataHostPath | default "/var/lib/abenix/data" }}
            type: DirectoryOrCreate

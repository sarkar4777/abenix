      ports:
        - port: 7687
          protocol: TCP
    # DNS
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # External APIs (LLM providers, Pinecone)
    - to:
        - ipBlock:

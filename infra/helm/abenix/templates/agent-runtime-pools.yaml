{{- /*
Per-pool agent-runtime Deployments + Services — one per entry in
.Values.scaling.pools. KEDA ScaledObjects (optional) scale each pool
on its own queue depth so a Monte-Carlo burst on the long-running pool
doesn't starve the chat pool.

Everything here is conditional on .Values.scaling.enabled so existing
local / minikube deployments stay unchanged. Flip the flag and the
pools appear without breaking anything else.
*/}}
{{- $release := .Release.Name -}}
{{- $ns := .Release.Namespace -}}
{{- $img := .Values.scaling.agentRuntimeImage | default (index .Values "agent-runtime" "image") -}}
{{- if .Values.scaling.enabled }}

{{- range .Values.scaling.pools }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $release }}-agent-runtime-{{ .key }}
  namespace: {{ $ns }}
  labels:
    app.kubernetes.io/name: agent-runtime
    app.kubernetes.io/component: runtime-pool
    app.kubernetes.io/instance: {{ $release }}
    abenix.io/pool: {{ .key }}
spec:
  replicas: {{ default 1 .min_replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: agent-runtime
      abenix.io/pool: {{ .key }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agent-runtime
        abenix.io/pool: {{ .key }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8001"
    spec:
      {{- if .nodeAffinity }}
      nodeSelector:
        abenix.io/node-pool: {{ .nodeAffinity }}
      {{- end }}
      # Same security context as the standalone agent-runtime chart so
      # the /data PVC (mounted below) is writable by the pod's appuser.
      # Without fsGroup the kubelet leaves /data root-owned and the
      # non-root container can't create /data/exports — every
      # code_executor / data_exporter / sandboxed_job call dies with
      # "Permission denied: '/data'".
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
      # Pre-create the per-feature subdirectories on the PVC so first
      # boot works regardless of who initialised the volume. Idempotent.
      # Runs as root (overrides the pod-level runAsUser=1001 above) so
      # it can chown /data to the runtime uid on multi-node hostPath +
      # newly-bound PVC alike.
      initContainers:
        - name: init-data-dirs
          image: busybox:1.36
          securityContext:
            runAsNonRoot: false
            runAsUser: 0
          command: ["sh", "-c"]
          args:
            - |
              mkdir -p /data/exports /data/uploads /data/ml-models \
                       /data/code-assets /data/code-asset-cache
              chown -R 1001:1001 /data
              chmod -R u+rwX,g+rwX /data
          volumeMounts:
            - name: shared-data
              mountPath: /data
      containers:
        - name: agent-runtime
          image: "{{ $img.repository }}:{{ $img.tag }}"
          imagePullPolicy: {{ $img.pullPolicy | default "Always" }}
          # Override the default uvicorn entry: this pod runs the Wave-2
          # consumer that drains the pool's queue, not the embedded API.
          command: ["python3", "consumer.py"]
          env:
            - name: RUNTIME_POOL
              value: {{ .key | quote }}
            - name: RUNTIME_MODE
              value: "remote"
            - name: QUEUE_BACKEND
              value: {{ default "celery" $.Values.scaling.queueBackend | quote }}
            - name: AGENT_CONCURRENCY
              value: {{ default 3 .concurrency_per_replica | quote }}
            {{- if eq (default "celery" $.Values.scaling.queueBackend) "nats" }}
            - name: NATS_URL
              value: "nats://{{ $release }}-nats:4222"
            - name: NATS_USER
              value: "abenix"
            - name: NATS_PASSWORD
              value: "abenix-dev"
            {{- end }}
            # LiveKit URL — without this, every meeting_* tool fails
            # at runtime even when the LiveKit server is reachable. The
            # service-discovery vars k8s injects (LIVEKIT_SERVER_*) are
            # NOT what the SDK reads; it reads LIVEKIT_URL specifically.
            - name: LIVEKIT_URL
              value: "ws://{{ $release }}-livekit-server.{{ $ns }}.svc.cluster.local:7880"
            # Explicit data paths so tools never have to guess. These
            # match the standalone chart and the local-mode dev-local.sh.
            - name: EXPORT_DIR
              value: "/data/exports"
            - name: UPLOAD_DIR
              value: "/data/uploads"
            - name: ML_MODELS_DIR
              value: "/data/ml-models"
            - name: CODE_ASSET_STORE
              value: "/data/code-assets"
            - name: CODE_ASSET_BUILD_CACHE
              value: "/data/code-asset-cache"
          envFrom:
            - secretRef:
                name: {{ $release }}-secrets
            - configMapRef:
                name: {{ $release }}-config
          volumeMounts:
            - name: shared-data
              mountPath: /data
          ports:
            - containerPort: 8001
              name: http
          resources:
            {{- toYaml (default (dict "requests" (dict "cpu" "200m" "memory" "512Mi") "limits" (dict "cpu" "1" "memory" "1Gi")) .resources) | nindent 12 }}
          readinessProbe:
            httpGet: { path: /health, port: 8001 }
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet: { path: /health, port: 8001 }
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: shared-data
          {{- if $.Values.sharedData.usePVC }}
          persistentVolumeClaim:
            claimName: {{ $release }}-shared-data
          {{- else }}
          # On minikube / single-node dev clusters, hostPath works
          # because every pod lands on the same node. Multi-node clusters
          # MUST flip sharedData.usePVC=true and provide a RWX class.
          hostPath:
            path: /tmp/{{ $release }}-shared-data
            type: DirectoryOrCreate
          {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $release }}-agent-runtime-{{ .key }}
  namespace: {{ $ns }}
  labels:
    app.kubernetes.io/name: agent-runtime
    abenix.io/pool: {{ .key }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: agent-runtime
    abenix.io/pool: {{ .key }}
  ports:
    - name: http
      port: 8001
      targetPort: 8001

{{- if $.Values.scaling.keda.enabled }}
---
# KEDA ScaledObject — scales on pool backlog. Uses the right primitive
# for whichever queueBackend is active so the scaler reads the correct
# depth signal:
#   * celery → Redis list  (celery.pool.<pool>)
#   * nats   → JetStream consumer pending  (agents.<pool>)
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: {{ $release }}-agent-runtime-{{ .key }}
  namespace: {{ $ns }}
  labels:
    abenix.io/pool: {{ .key }}
spec:
  scaleTargetRef:
    name: {{ $release }}-agent-runtime-{{ .key }}
  minReplicaCount: {{ default 1 .min_replicas }}
  maxReplicaCount: {{ default 10 .max_replicas }}
  pollingInterval: 15
  cooldownPeriod: 300            # 5 min — keep warm pods for bursts
  triggers:
    {{- if eq (default "celery" $.Values.scaling.queueBackend) "nats" }}
    - type: nats-jetstream
      metadata:
        natsServerMonitoringEndpoint: "http://{{ $release }}-nats:8222"
        account: "$G"
        stream: "agents"
        consumer: "abenix-{{ .key }}-consumer"
        lagThreshold: {{ default "3" .keda_queue_trigger | quote }}
    {{- else }}
    - type: redis
      metadata:
        address: {{ $release }}-redis-master:6379
        listName: celery.pool.{{ .key }}
        listLength: {{ default "3" .keda_queue_trigger | quote }}
    {{- end }}
    {{- if $.Values.scaling.keda.prometheusUrl }}
    - type: prometheus
      metadata:
        serverAddress: {{ $.Values.scaling.keda.prometheusUrl | quote }}
        metricName: abenix_execution_p95_ms
        query: 'histogram_quantile(0.95, sum by(le) (rate(abenix_execution_duration_seconds_bucket{pool="{{ .key }}"}[5m]))) * 1000'
        threshold: "90000"       # 90s p95 triggers scale-up
    {{- end }}
{{- end }}

{{- end }}
{{- end }}

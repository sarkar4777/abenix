image:
  repository: neo4j
  tag: "5.20.0"
  pullPolicy: IfNotPresent

database: neo4j

auth:
  username: neo4j
  existingSecret: abenix-secrets
  existingSecretPasswordKey: neo4j-password

plugins:
  - apoc

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 2Gi

persistence:
  enabled: true
  size: 10Gi
  storageClass: ""

jvm:
  heap:
    initial: 512m
    max: 1g
  pagecache: 512m

replicaCount: 1

service:
  bolt:
    port: 7687
  http:
    port: 7474
